services:
  m1yrat:
    image: ghcr.io/webdevised/m1yrat-free:latest
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/m1yrat
      SPRING_DATASOURCE_USERNAME: m1yrat
      SPRING_DATASOURCE_PASSWORD: m1yrat-internal
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "1"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: m1yrat
      POSTGRES_USER: m1yrat
      POSTGRES_PASSWORD: m1yrat-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U m1yrat -d m1yrat"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
